# GitHub Pages: deploy from branch main, folder / (root)
# Site: https://einlang.github.io/einlang/
# Renders from index.md only; everything else excluded so no other pages are built.
title: Einlang
baseurl: "/einlang"
exclude:
  - README.md
  - CONTRIBUTING.md
  - docs
  - examples
  - src
  - tests
  - stdlib
  - scripts
  - .github
  - "*.py"
  - "*.ein"
  - .cursorrules
  - .gitignore
  - LICENSE
