<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #7dd3c0;
      --accent-hover: #9eeadc;
    }
    * { box-sizing: border-box; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 32rem;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }
    header {
      margin-bottom: 4rem;
    }
    header a {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      font-weight: 500;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-decoration: none;
    }
    header a:hover { color: var(--accent); }
    main h1 {
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      font-size: clamp(1.75rem, 5vw, 2.25rem);
      font-weight: 500;
      letter-spacing: -0.02em;
      margin: 0 0 1.25rem;
      color: var(--text);
    }
    main p {
      margin: 0 0 1rem;
      color: var(--muted);
    }
    main p.lead {
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 2rem;
    }
    .cta {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.65rem 1.25rem;
      font-family: ui-monospace, "Cascadia Code", "SF Mono", Consolas, monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--bg);
      background: var(--accent);
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .cta:hover {
      background: var(--accent-hover);
      color: var(--bg);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a href="{{ site.baseurl }}/">{{ site.title }}</a>
    </header>
    <main>
      {{ content }}
    </main>
  </div>
</body>
</html>
